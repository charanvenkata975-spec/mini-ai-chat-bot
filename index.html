<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PV AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="title">PV AI</div>
    <div class="subtitle">Human-like Assistant</div>
    <button class="history-btn" onclick="toggleHistory()">History</button>
  </header>

  <!-- CHAT -->
  <main id="chatBox" class="chat">
    <div class="bot">Hello 👋  
      Ask me anything!
    </div>
  </main>

  <!-- INPUT BAR -->
 <footer class="input-area">

  <!-- IMAGE BUTTON -->
  <label class="icon-btn image-btn">
    <input type="file" id="imageInput" accept="image/*" hidden>
    <!-- IMAGE SVG -->
    <svg viewBox="0 0 24 24" class="icon">
      <rect x="3" y="5" width="18" height="14" rx="2"></rect>
      <circle cx="9" cy="10" r="2"></circle>
      <path d="M21 15l-5-5-4 4-2-2-5 5"></path>
    </svg>
  </label>

  <!-- MIC BUTTON (PUSH TO TALK) -->
  <button class="icon-btn mic-btn"
    onmousedown="startVoice()"
    onmouseup="stopVoice()"
    ontouchstart="startVoice()"
    ontouchend="stopVoice()">

    <!-- MIC SVG -->
    <svg viewBox="0 0 24 24" class="icon mic-icon">
      <rect x="9" y="2" width="6" height="12" rx="3"></rect>
      <path d="M5 10v2a7 7 0 0 0 14 0v-2"></path>
      <line x1="12" y1="19" x2="12" y2="22"></line>
      <line x1="8" y1="22" x2="16" y2="22"></line>
    </svg>

  </button>

  <input id="userInput" placeholder="Ask something…" />
  <button class="send-btn" onclick="sendMessage()">➤</button>

</footer>

  <!-- FOOTER -->
  <div class="credit">
    Created by <b>Venkata Charan & Kartheek Goud</b>
  </div>

</div>

<script src="script.js"></script>
<div id="historyPanel" class="history-panel hidden">

  <div class="history-header">
    <button class="back-btn" onclick="toggleHistory()">← Back</button>
    <h3>Chat History</h3>
  </div>

  <button class="clear-btn" onclick="clearHistory()">Clear History</button>
  <div id="historyList"></div>

</div>
</div>
</body>
</html>
