<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MINI AI CHAT BOT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="overlay" class="overlay"></div>

<div id="sidePanel" class="side-panel">
  <div class="history-header">
    <span>Menu</span>
    <button class="back-btn" onclick="toggleMenu()" style="display: flex; align-items: center; gap: 4px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      Close
    </button>
  </div>

  <h4 style="font-size:11px;opacity:0.55;margin:6px 0 10px; text-transform:uppercase;letter-spacing:1.2px;font-weight:700">
    Chat History
  </h4>
  <div id="historyList"></div>

  <button class="clear-btn" onclick="newChat()" style="display: flex; align-items: center; justify-content: center; gap: 6px;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    New Chat
  </button>
  <button class="clear-btn" onclick="clearHistory()" style="display: flex; align-items: center; justify-content: center; gap: 6px;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
    Clear All History
  </button>
  <button class="clear-btn" onclick="exportHistory()" style="display: flex; align-items: center; justify-content: center; gap: 6px;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
    Export History
  </button>

  <h4 style="font-size:11px;opacity:0.55;margin:14px 0 10px; text-transform:uppercase;letter-spacing:1.2px;font-weight:700">
    Settings
  </h4>

  <div class="settings-item">
    <span>Voice Output</span>
    <label class="switch">
      <input type="checkbox" id="voiceToggle" checked onchange="toggleVoice(this.checked)">
      <span class="slider"></span>
    </label>
  </div>

  <div class="settings-item">
    <span>Light Mode</span>
    <label class="switch">
      <input type="checkbox" id="lightToggle" onchange="toggleTheme(this.checked)">
      <span class="slider"></span>
    </label>
  </div>
</div>

<div class="app-container">
  
  <div class="app">
    <header class="header">
      <button class="menu-btn" onclick="toggleMenu()" style="display: flex; align-items: center; justify-content: center;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      </button>
      <div class="header-text">
        <div class="title">MINI AI CHAT BOT</div>
        <div class="subtitle">Chat · Code · Image AI</div>
      </div>
      <div style="width:42px;flex-shrink:0"></div>
    </header>

    <div class="mode-bar">
      <button class="mode-btn active" data-mode="chat" onclick="setMode('chat')" style="display: inline-flex; align-items: center; gap: 6px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        Chat
      </button>
      <button class="mode-btn" data-mode="image-gen" onclick="setMode('image-gen')" style="display: inline-flex; align-items: center; gap: 6px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
        Image Gen
      </button>
      <button class="mode-btn" data-mode="image-analyze" onclick="setMode('image-analyze')" style="display: inline-flex; align-items: center; gap: 6px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        Analyze
      </button>
    </div>

    <main id="chatBox" class="chat"></main>

    <footer class="chat-footer">
      <div class="input-area">

        <input type="file" id="imageInput" accept="image/*" style="display:none">

        <button class="icon-btn attach-btn" id="attachBtn" title="Attach Image">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/>
          </svg>
        </button>

        <button class="icon-btn mic-btn" title="Voice Input">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4M12 3a4 4 0 014 4v4a4 4 0 01-8 0V7a4 4 0 014-4z"/>
          </svg>
        </button>

        <textarea id="userInput" placeholder="Ask Mini AI anything..." rows="1"></textarea>

        <button id="sendBtn" class="send-btn" onclick="sendMessage()" title="Send">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
          </svg>
        </button>

      </div>
      <div class="credit">Created by <b>Venkata&nbsp;Charan</b></div>
    </footer>
  </div>
  
</div>

<script src="script.js"></script>
</body>
</html>
